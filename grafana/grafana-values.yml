# Grafana configuration for OpenShift

persistence:
  enabled: false

adminUser: admin
adminPassword: admin

# AI-ASSISTED: Bob
# OpenShift security context - set to null to let OpenShift assign UIDs
securityContext:
  runAsUser: null
  runAsGroup: null
  fsGroup: null
  runAsNonRoot: true

# AI-ASSISTED: Bob
podSecurityContext:
  runAsUser: null
  runAsGroup: null
  fsGroup: null
  runAsNonRoot: true

podAnnotations: {}

# AI-ASSISTED: Bob
# Explicitly set seccomp profile
containerSecurityContext:
  seccompProfile:
    type: RuntimeDefault
  runAsUser: null
  runAsNonRoot: true

# AI-ASSISTED: Bob
# Override init container security context
initChownData:
  enabled: true
  securityContext:
    runAsUser: null
    runAsNonRoot: true

serviceAccount:
  create: true
  name: grafana

datasources: {}
dashboardProviders: {}
dashboards: {}
