name: ci
on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - name: Build
        run: make build
      - name: Setup 
        run: make compose-up
      - name: Test
        run: make test
      - name: Teardown
        run: make compose-down
