apiVersion: v1
kind: Secret
metadata:
  name: cost-metrics-db
  namespace: cost-metrics
type: Opaque
data:
  # Base64 encoded values - replace postgres-password with your actual password
  # To encode: echo -n "your-value" | base64
  postgres-password:
  # database-url with sslmode=require for secure connections
  # Example (costmetrics:costmetrics@postgres:5432/costmetrics?sslmode=require):
  # echo -n "postgres://costmetrics:costmetrics@postgres:5432/costmetrics?sslmode=require" | base64
  # Result: cG9zdGdyZXM6Ly9jb3N0bWV0cmljczpjb3N0bWV0cmljc0Bwb3N0Z3Jlczo1NDMyL2Nvc3RtZXRyaWNzP3NzbG1vZGU9cmVxdWlyZQ==
  database-url:
