---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: cma-observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s
      external_labels:
        cluster: 'openshift-cluster'
        prometheus: 'federated'
        replica: '0'

    scrape_configs:
      - job_name: 'federate-openshift-monitoring'
        scrape_interval: 30s
        scrape_timeout: 25s
        honor_labels: true
        metrics_path: '/federate'
        
        params:
          'match[]':
            - '{__name__=~"container_cpu_.*"}'
            - '{__name__=~"node_cpu_.*"}'
            - '{__name__=~"machine_cpu_.*"}'
            - '{__name__=~"container_memory_.*"}'
            - '{__name__=~"node_memory_.*"}'
            - '{__name__=~"machine_memory_.*"}'
            - '{__name__=~"container_network_.*"}'
            - '{__name__=~"node_network_.*"}'
            - '{__name__=~"container_fs_.*"}'
            - '{__name__=~"node_filesystem_.*"}'
            - '{__name__=~"kube_pod_.*"}'
            - '{__name__=~"kube_container_.*"}'
            - '{__name__=~"kube_node_.*"}'
            - '{__name__=~"kube_namespace_.*"}'
            - '{__name__=~"kube_resourcequota.*"}'
            - '{__name__="up"}'
        
        static_configs:
          - targets:
              - 'prometheus-k8s.openshift-monitoring.svc:9091'
        
        scheme: https
        tls_config:
          insecure_skip_verify: true
        
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token

