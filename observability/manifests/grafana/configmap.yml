---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: cma-observability
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Thanos
        type: prometheus
        access: proxy
        url: http://thanos-query:9090
        isDefault: true
        editable: true
        jsonData:
          httpMethod: GET
          timeInterval: 30s

